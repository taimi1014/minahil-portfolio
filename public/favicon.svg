<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .center { transform-origin: 32px 32px; animation: spin 8s linear infinite; }
  </style>
  <g class="center">
    <g fill="#F4A900">
      <ellipse cx="32" cy="10" rx="6" ry="12"/>
      <ellipse cx="32" cy="10" rx="6" ry="12" transform="rotate(45 32 32)"/>
      <ellipse cx="32" cy="10" rx="6" ry="12" transform="rotate(90 32 32)"/>
      <ellipse cx="32" cy="10" rx="6" ry="12" transform="rotate(135 32 32)"/>
      <ellipse cx="32" cy="10" rx="6" ry="12" transform="rotate(180 32 32)"/>
      <ellipse cx="32" cy="10" rx="6" ry="12" transform="rotate(225 32 32)"/>
      <ellipse cx="32" cy="10" rx="6" ry="12" transform="rotate(270 32 32)"/>
      <ellipse cx="32" cy="10" rx="6" ry="12" transform="rotate(315 32 32)"/>
    </g>
  </g>
  <circle cx="32" cy="32" r="10" fill="#5D4037"/>
  <circle cx="32" cy="32" r="7" fill="#795548"/>
</svg>
